{% extends "base.html" %}
{% block titulo_pagina %}Editar Perfil{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3>Editar Mi Perfil</h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('perfil.edit', id=perfil.idPerfil) }}" method="post" class="needs-validation" novalidate>
                        <div class="form-group mb-3">
                            <label for="bio" class="form-label">Biografía:</label>
                            <textarea id="bio" name="bio" rows="5" class="form-control"
                                      placeholder="Cuéntanos sobre ti..." required>{{ perfil.bio or '' }}</textarea>
                            <div class="invalid-feedback">
                                Por favor, ingresa una biografía.
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Actualizar Perfil</button>
                            <a href="{{ url_for('perfil.mi_perfil') }}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Validación del formulario
(function () {
    'use strict'
    var forms = document.querySelectorAll('.needs-validation')
    Array.prototype.slice.call(forms)
        .forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
})()
</script>
{% endblock %}
